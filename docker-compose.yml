services:
  tourhub-fastapi:
    build: .
    container_name: tourhub-bali-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    environment:
      API_SECRET_KEY: "123"
      DATA_SOURCE: "laravel"
      DATA_PATH: "/app/data/cleaned_dataaset_bali.csv"

      LARAVEL_DATASET_URL: "https://prediksi.djncloud.my.id/api/internal/tourist-destinations"
      LARAVEL_INTERNAL_KEY: "123"

      DATASET_REQUEST_TIMEOUT: "30"
      ENABLE_BMKG: "true"
    restart: unless-stopped